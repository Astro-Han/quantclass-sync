<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantClass Sync</title>
  <link rel="stylesheet" href="style.css" />
  <!-- app.js 必须在 Alpine 之前加载，确保 alpine:init 监听器已注册 -->
  <script defer src="app.js"></script>
  <script defer src="alpine.min.js"></script>
</head>
<body>
  <div class="app" x-data="app()">

    <!-- 顶部导航 -->
    <header class="header">
      <span class="header-title">QuantClass Sync</span>
      <nav class="tabs">
        <button
          class="tab"
          :class="{ active: tab === 'overview' }"
          @click="switchTab('overview')"
        >总览</button>
        <button
          class="tab"
          :class="{ active: tab === 'sync' }"
          @click="switchTab('sync')"
        >同步</button>
        <button
          class="tab"
          :class="{ active: tab === 'history' }"
          @click="switchTab('history')"
        >历史</button>
      </nav>
    </header>

    <!-- 主内容区 -->
    <main class="content">

      <!-- ===== 总览页面 ===== -->
      <div x-show="tab === 'overview'">

        <!-- 加载状态 -->
        <div class="loading" x-show="loading">加载中...</div>

        <!-- 错误提示 -->
        <div class="error-banner" x-show="!loading && overviewError" x-text="overviewError"></div>

        <template x-if="!loading && !overviewError">
          <div>
            <!-- 统计卡片（点击筛选） -->
            <div class="stats-cards">
              <div class="stat-card" :class="{ 'stat-card-active': filterColor === 'green' }" @click="toggleFilter('green')">
                <span class="stat-dot green"></span>
                <div class="stat-count" x-text="summary.green"></div>
                <div class="stat-label">最新</div>
              </div>
              <div class="stat-card" :class="{ 'stat-card-active': filterColor === 'yellow' }" @click="toggleFilter('yellow')">
                <span class="stat-dot yellow"></span>
                <div class="stat-count" x-text="summary.yellow"></div>
                <div class="stat-label">落后</div>
              </div>
              <div class="stat-card" :class="{ 'stat-card-active': filterColor === 'red' }" @click="toggleFilter('red')">
                <span class="stat-dot red"></span>
                <div class="stat-count" x-text="summary.red"></div>
                <div class="stat-label">异常</div>
              </div>
              <div class="stat-card" :class="{ 'stat-card-active': filterColor === 'gray' }" @click="toggleFilter('gray')">
                <span class="stat-dot gray"></span>
                <div class="stat-count" x-text="summary.gray"></div>
                <div class="stat-label">未同步</div>
              </div>
            </div>

            <!-- 搜索框 -->
            <div class="filter-bar">
              <input
                type="text"
                class="search-input"
                placeholder="搜索产品..."
                x-model="searchText"
              />
            </div>

            <!-- 产品状态表格 -->
            <table class="product-table">
              <thead>
                <tr>
                  <th>状态</th>
                  <th>产品名称</th>
                  <th>本地日期</th>
                  <th>落后天数</th>
                  <th>上次结果</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="p in filteredProducts()" :key="p.name">
                  <tr>
                    <td><span class="status-dot" :class="p.color"></span></td>
                    <td x-text="p.name"></td>
                    <td x-text="p.local_date || '--'"></td>
                    <td x-text="p.behind_days != null ? p.behind_days : '--'"></td>
                    <td x-text="{ ok: '成功', error: '失败', skipped: '跳过', '': '' }[p.last_result] ?? p.last_result"></td>
                  </tr>
                </template>
              </tbody>
            </table>
            <div class="empty-state" x-show="filteredProducts().length === 0 && products.length > 0">
              无匹配产品
            </div>

            <!-- 数据健康检查 -->
            <div class="health-section">
              <button class="btn btn-health" @click="checkHealth()" :disabled="healthLoading">
                <span x-show="!healthLoading">检查数据健康</span>
                <span x-show="healthLoading">检查中...</span>
              </button>

              <!-- 错误提示 -->
              <div class="error-banner" x-show="healthError" x-text="healthError" style="margin-top: 12px;"></div>

              <!-- 检查结果 -->
              <template x-if="healthReport">
                <div class="health-result" style="margin-top: 12px;">
                  <!-- 无问题 -->
                  <div class="health-ok" x-show="healthReport.summary.total === 0">
                    &#10003; 数据健康，未发现问题
                    <span class="health-meta" x-text="'（扫描 ' + healthReport.scanned_products + ' 个产品，耗时 ' + healthReport.elapsed_seconds + ' 秒）'"></span>
                  </div>

                  <!-- 有问题 -->
                  <div x-show="healthReport.summary.total > 0">
                    <div class="health-warn">
                      发现 <span x-text="healthReport.summary.total"></span> 个问题
                      <span class="health-meta" x-text="'（扫描 ' + healthReport.scanned_products + ' 个产品，耗时 ' + healthReport.elapsed_seconds + ' 秒）'"></span>
                    </div>
                    <ul class="health-issue-list">
                      <template x-for="issue in healthReport.issues" :key="issue.detail">
                        <li>
                          <span class="health-issue-tag" x-text="{ missing_data: '缺失', csv_unreadable: '不可读', orphan_temp: '临时文件' }[issue.type] || issue.type"></span>
                          <span x-show="issue.product" class="health-issue-product" x-text="issue.product"></span>
                          <span class="health-issue-detail" x-text="issue.detail"></span>
                        </li>
                      </template>
                    </ul>
                  </div>
                </div>
              </template>
            </div>

            <!-- 底部信息 -->
            <div class="footer-info">
              <span x-text="lastRun ? '上次同步: ' + lastRun.started_at + '  耗时: ' + formatDuration(lastRun.duration_seconds) : '尚未同步'"></span>
              <span x-show="dataRoot" x-text="'数据目录: ' + dataRoot"></span>
            </div>
          </div>
        </template>
      </div>

      <!-- ===== 同步页面 ===== -->
      <div x-show="tab === 'sync'" class="sync-panel">

        <!-- idle 状态 -->
        <div x-show="syncStatus === 'idle'">
          <!-- 总览加载失败时，同步页也展示错误原因 -->
          <div class="error-banner" x-show="overviewError" x-text="overviewError"></div>
          <div class="sync-info" x-show="!overviewError">
            <p x-show="dataRoot" x-text="'数据目录: ' + dataRoot"></p>
            <p x-text="'待更新产品: ' + (summary.yellow + summary.red) + ' 个'"></p>
          </div>
          <button class="btn btn-primary" @click="startSync()">开始同步</button>
        </div>

        <!-- syncing 状态 -->
        <div x-show="syncStatus === 'syncing'">
          <div class="sync-current">
            <span x-text="currentProduct ? '已完成: ' + currentProduct : '准备中...'"></span>
            <span class="sync-progress-text" x-text="total > 0 ? completed + ' / ' + total : ''"></span>
          </div>
          <!-- 进度条 -->
          <div class="progress-bar">
            <div class="progress-fill" :style="'width: ' + progressPercent() + '%'"></div>
          </div>
          <div class="sync-stats">
            <span x-text="'已完成: ' + completed + ' 个'"></span>
            <span x-text="'预估剩余: ' + estimatedRemaining()"></span>
            <span x-text="'已用时: ' + formatDuration(elapsedSeconds)"></span>
          </div>
          <button class="btn btn-disabled" disabled>同步中...</button>
        </div>

        <!-- done 状态 -->
        <div x-show="syncStatus === 'done'" class="sync-result">
          <div class="sync-done-mark">&#10003; 同步完成</div>
          <template x-if="runSummary">
            <div class="sync-done-stats">
              <span class="green" x-text="'成功: ' + (runSummary.ok || 0)"></span>
              <span class="red" x-text="'失败: ' + (runSummary.error || 0)"></span>
              <span class="gray" x-text="'跳过: ' + (runSummary.skipped || 0)"></span>
              <span x-text="'耗时: ' + formatDuration(runSummary.duration_seconds)"></span>
            </div>
          </template>
          <!-- 失败产品列表 -->
          <template x-if="runSummary && runSummary.failed_products && runSummary.failed_products.length > 0">
            <div>
              <div class="failed-list-label">失败产品</div>
              <ul class="failed-list">
                <template x-for="name in runSummary.failed_products" :key="name">
                  <li x-text="name"></li>
                </template>
              </ul>
            </div>
          </template>
          <button class="btn btn-primary" @click="resetSync()">再次同步</button>
        </div>

        <!-- error 状态 -->
        <div x-show="syncStatus === 'error'" class="sync-result">
          <div class="sync-error-mark">&#10007; 同步失败</div>
          <div class="sync-error-msg" x-text="errorMessage"></div>
          <!-- 部分产品失败时展示摘要详情 -->
          <template x-if="runSummary">
            <div>
              <div class="sync-done-stats">
                <span class="green" x-text="'成功: ' + (runSummary.ok || 0)"></span>
                <span class="red" x-text="'失败: ' + (runSummary.error || 0)"></span>
                <span class="gray" x-text="'跳过: ' + (runSummary.skipped || 0)"></span>
                <span x-text="'耗时: ' + formatDuration(runSummary.duration_seconds)"></span>
              </div>
              <template x-if="runSummary.failed_products && runSummary.failed_products.length > 0">
                <div>
                  <div class="failed-list-label">失败产品</div>
                  <ul class="failed-list">
                    <template x-for="name in runSummary.failed_products" :key="name">
                      <li x-text="name"></li>
                    </template>
                  </ul>
                </div>
              </template>
            </div>
          </template>
          <button class="btn btn-primary" @click="resetSync()">重试</button>
        </div>

      </div>

      <!-- ===== 历史页面 ===== -->
      <div x-show="tab === 'history'">

        <!-- 加载状态 -->
        <div class="loading" x-show="historyLoading">加载中...</div>

        <!-- 错误提示 -->
        <div class="error-banner" x-show="!historyLoading && historyError" x-text="historyError"></div>

        <!-- 列表视图 -->
        <div x-show="!historyLoading && !historyDetail">
          <table class="product-table" x-show="historyList.length > 0">
            <thead>
              <tr>
                <th>运行时间</th>
                <th>耗时</th>
                <th>成功</th>
                <th>失败</th>
                <th>跳过</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="run in historyList" :key="run.run_id">
                <tr>
                  <td x-text="run.started_at"></td>
                  <td x-text="formatDuration(run.duration_seconds)"></td>
                  <td><span class="text-green" x-text="run.success_total"></span></td>
                  <td><span class="text-red" x-text="run.failed_total"></span></td>
                  <td x-text="run.skipped_total"></td>
                  <td><button class="btn-link" @click="viewDetail(run.report_file)">详情</button></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty-state" x-show="historyList.length === 0 && !historyError">暂无运行记录</div>
        </div>

        <!-- 详情视图（用 x-if 避免 historyDetail 为 null 时访问属性报错） -->
        <template x-if="!historyLoading && historyDetail">
          <div>
            <button class="btn-back" @click="backToList()">&larr; 返回列表</button>
            <div class="detail-header">
              <span x-text="'运行时间: ' + historyDetail.started_at"></span>
              <span x-text="'耗时: ' + formatDuration(historyDetail.duration_seconds)"></span>
            </div>
            <div class="sync-done-stats" style="margin-bottom: 16px;">
              <span class="green" x-text="'成功: ' + historyDetail.success_total"></span>
              <span class="red" x-text="'失败: ' + historyDetail.failed_total"></span>
              <span class="gray" x-text="'跳过: ' + historyDetail.skipped_total"></span>
            </div>
            <table class="product-table">
              <thead>
                <tr>
                  <th>状态</th>
                  <th>产品名称</th>
                  <th>耗时</th>
                  <th>错误</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="p in historyDetail.products" :key="p.product">
                  <tr>
                    <td>
                      <span class="status-dot" :class="{ green: p.status === 'ok', red: p.status === 'error', gray: p.status === 'skipped' }"></span>
                    </td>
                    <td x-text="p.product"></td>
                    <td x-text="formatDuration(p.elapsed_seconds)"></td>
                    <td :class="{ 'text-error': p.error }" :title="p.error" x-text="p.error || ''"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>

      </div>

    </main>
  </div>
</body>
</html>

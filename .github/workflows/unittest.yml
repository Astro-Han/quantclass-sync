name: Unittest

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run Unittest
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
